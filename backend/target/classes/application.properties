# 应用名称
spring.application.name=backend

# 数据库配置 - PostgreSQL连接配置
spring.datasource.url=jdbc:postgresql://localhost:5432/peach-shop
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
# 禁用SQL初始化脚本，避免删除已有数据
spring.sql.init.mode=NEVER
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.encoding=UTF-8

# HikariCP连接池配置
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0

# JPA配置
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# 服务器配置
server.port=8080

# CORS配置
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:2022,http://localhost:2023
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT配置
jwt.secret=peachshopsecretkey12345678901234567890
jwt.expiration=86400000

# 日志配置
logging.level.org.springframework=INFO
logging.level.com.peachshop=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE